<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Walk of Wisdom-wijzer</title>
    <style>
      :root {
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8f5ee;
        color: #1e1e1e;
      }

      main {
        width: min(92vw, 720px);
        text-align: center;
        padding: 2rem 1rem;
      }

      h1,
      h2 {
        margin: 0 0 1.25rem;
        line-height: 1.2;
      }

      h1 {
        font-size: clamp(2rem, 6vw, 3.4rem);
      }

      h2 {
        font-size: clamp(1.7rem, 5vw, 2.9rem);
      }

      .buttons {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      button {
        font-size: clamp(1.2rem, 4vw, 2rem);
        font-weight: 700;
        border: 0;
        border-radius: 0.75rem;
        padding: 0.9rem 2rem;
        min-width: 8rem;
        cursor: pointer;
      }

      .yes {
        background: #2f855a;
        color: #fff;
      }

      .no {
        background: #c53030;
        color: #fff;
      }

      #question-two,
      #result {
        display: none;
      }

      #result {
        font-size: clamp(1.8rem, 6vw, 3.2rem);
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <section id="question-one">
        <h1>Ben je in of dicht bij Nijmegen?</h1>
        <div class="buttons">
          <button type="button" class="yes" id="q1-yes">Ja</button>
          <button type="button" class="no" id="q1-no">Nee</button>
        </div>
      </section>

      <section id="question-two">
        <h2>Ben je buiten?</h2>
        <div class="buttons">
          <button type="button" class="yes" id="q2-yes">Ja</button>
          <button type="button" class="no" id="q2-no">Nee</button>
        </div>
      </section>

      <p id="result"></p>
    </main>

    <script>
      const questionOne = document.getElementById('question-one');
      const questionTwo = document.getElementById('question-two');
      const result = document.getElementById('result');

      const showResult = (text) => {
        questionOne.style.display = 'none';
        questionTwo.style.display = 'none';
        result.style.display = 'block';
        result.textContent = text;
      };

      document.getElementById('q1-yes').addEventListener('click', () => {
        questionTwo.style.display = 'block';
      });

      document.getElementById('q1-no').addEventListener('click', () => {
        showResult('Je loopt niet op de Walk of Wisdom.');
      });

      document.getElementById('q2-yes').addEventListener('click', () => {
        showResult('Je loopt waarschijnlijk op de Walk of Wisdom.');
      });

      document.getElementById('q2-no').addEventListener('click', () => {
        showResult('Je loopt niet op de Walk of Wisdom.');
      });
    </script>
  </body>
</html>
